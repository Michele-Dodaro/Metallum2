<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #e0e0e0;
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px #0008, 0 0 15px #d32f2f1a;
            width: min(100%, 380px);
            border: 1px solid #333;
            box-sizing: border-box;
        }

        label {
            display: inline-block;
            font-weight: 600;
            color: #ff5252;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 22px;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            background: #2c2c2c;
            color: #fff;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #d32f2f;
            background: #333;
        }

        input::placeholder { color: #777; }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
            border: none;
        }

        button[type="submit"] {
            background: #d32f2f;
            color: #fff;
        }

        button[type="reset"] {
            background: transparent;
            color: #bbb;
            border: 1px solid #444;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        button:active { transform: translateY(0); }

        p {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 25px;
            color: #999;
        }

        a {
            color: #ff5252;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover { text-decoration: underline; }

        #fallimento, #successo {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid;
        }

        #fallimento {
            background: #d32f2f26;
            color: #ff8a80;
            border-color: #d32f2f;
        }


    </style>
</head>
<body>

<form action="/j_security_check" method="post">

    <label for="username">Nome utente</label><br>
    <input type="text" name="j_username" id="username" placeholder="username" required><br>

    <label for="password">Password</label><br>
    <input type="password" name="j_password" id="password" placeholder="password" required><br>

    {#if errorMessage}
        <div id="fallimento">
            Login fallito: credenziali errate.
        </div>
    {/if}

    <button type="submit">Accedi</button>
    <button type="reset">Svuota</button>

    <p>Non hai un account? <a href="/registrazione">Registrati qui</a></p>

</form>
</body>
</html>
