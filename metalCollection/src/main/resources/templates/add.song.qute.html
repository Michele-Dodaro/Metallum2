<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Canzone - {bandName}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #1a1a1a;
            color: #eee;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .card {
            background: #262626;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #800d0d;
            width: min(100%, 450px);
        }

        h2 {
            color: #800d0d;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 4px;
            box-sizing: border-box;
            font: inherit;
            outline: none;
        }

        input:focus, select:focus { border-color: #800d0d; }

        select option { background: #262626; }

        .duration-inputs { display: flex; gap: 10px; }

        .btn-save {
            width: 100%;
            background: #800d0d;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn-save:hover { background: #a01010; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nuovo Brano</h2>
    <p>Band: <strong>{bandName}</strong></p>

    <form action="/add-song" method="POST">
        <input type="hidden" name="bandName" value="{bandName}">

        <div class="form-group">
            <label>Titolo della Canzone</label>
            <input type="text" name="title" placeholder="es. Master of Puppets" required>
        </div>

        <div class="form-group">
            <label>Genere Musicale</label>
            <select name="genreId" required>
                <option value="" disabled selected>Scegli il genere...</option>
                {#for genre in genres}
                    <option value="{genre.genre}">{genre.genre}</option>
                {#else}
                    <option value="">Nessun genere disponibile</option>
                {/for}
            </select>
        </div>

        <div class="form-group">
            <label>Durata (Minuti : Secondi)</label>
            <div class="duration-inputs">
                <input type="number" name="minutes" placeholder="Min" min="0" required>
                <input type="number" name="seconds" placeholder="Sec" min="0" max="59" required>
            </div>
        </div>

        <button type="submit" class="btn-save">AGGIUNGI ALLA DISCOGRAFIA</button>
    </form>

    <a href="/band/{bandName}" style="display:block; text-align:center; margin-top:15px; color:#666; text-decoration:none;">Annulla</a>
</div>

</body>
</html>
