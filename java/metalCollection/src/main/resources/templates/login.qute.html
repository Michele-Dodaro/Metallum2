<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e0e0e0;
        }


        form {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(211, 47, 47, 0.1);
            width: 100%;
            max-width: 380px;
            border: 1px solid #333;
        }

        label {
            font-weight: 600;
            color: #ff5252;
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 22px;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: #2c2c2c;
            color: white;
        }

        input:focus {
            outline: none;
            border-color: #d32f2f;
            background-color: #333;
        }

        input::placeholder {
            color: #777;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button[type="submit"] {
            background-color: #d32f2f;
            color: white;
        }

        button[type="reset"] {
            background-color: transparent;
            color: #bbb;
            border: 1px solid #444;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        p {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 25px;
            color: #999;
        }

        a {
            color: #ff5252;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        [id="fallimento"] {
            background-color: rgba(211, 47, 47, 0.15);
            color: #ff8a80;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #d32f2f;
        }

        [id="successo"] {
            background-color: rgba(76, 175, 80, 0.15);
            color: #b9f6ca;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #4caf50;
        }
    </style>
</head>
<body>

<form action="/j_security_check" method="post">

    <label for="username">Nome utente</label><br>
    <input type="text" name="j_username" id="username" placeholder="username" required><br>

    <label for="password">Password</label><br>
    <input type="password" name="j_password" id="password" placeholder="password" required><br>

    {#if errorMessage}
        <div id="fallimento">
            Login fallito: credenziali errate.
        </div>
    {/if}

    <button type="submit">Accedi</button>
    <button type="reset">Svuota</button>

    <p>Non hai un account? <a href="/registrazione">Registrati qui</a></p>

</form>
</body>
</html>
