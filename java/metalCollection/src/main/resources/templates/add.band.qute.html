<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Band - Metallum 2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #1a1a1a; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #262626; padding: 40px; border-radius: 12px; border: 1px solid #800d0d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { color: #800d0d; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #888; font-size: 0.9em; }
        input { width: 100%; background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #800d0d; outline: none; }

        .btn-save { width: 100%; background: #800d0d; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-save img { height: 20px; filter: brightness(0) invert(1); }
        .back-btn { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.85em; }
        .back-btn:hover { color: #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nuova Band</h2>
    <form action="/add-band" method="POST">
        <div class="form-group">
            <label>Nome della Band</label>
            <input type="text" name="bandName" placeholder="es. Iron Maiden" required>
        </div>

        <div class="form-group">
            <label>Provenienza</label>
            <input type="text" name="provenance" placeholder="es. Inghilterra" required>
        </div>

        <button type="submit" class="btn-save">
            <img src="/img/addIcon.png" alt="+"> SALVA BAND
        </button>
    </form>

    <a href="/homepage" class="back-btn">← Annulla e torna indietro</a>
</div>

</body>
</html>
